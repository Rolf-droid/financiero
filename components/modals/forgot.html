<div class="modal-overlay" id="modal-forgot">
  <div class="modal-box">
    <h3>🔑 Recuperar Contraseña</h3>
    <p>Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
    <label class="login-label" for="forgot-email">Correo electrónico</label>
    <div class="login-input-wrap">
      <span class="login-icon">✉️</span>
      <input class="login-input" type="email" id="forgot-email" placeholder="tucorreo@gmail.com">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeForgot()">Cancelar</button>
      <button class="btn-modal-send" onclick="sendForgot()">📨 Enviar Instrucciones</button>
    </div>
  </div>
</div>
